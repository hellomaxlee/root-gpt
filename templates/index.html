<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Bot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Root Bot</h1>
            <p class="subtitle">Your guide to the Woodland</p>
        </header>

        <div class="chat-container" id="chat">
            <div class="message assistant">
                <div class="bubble">Welcome to Root Bot! I'm here to help you with anything about the Root board game — rules, factions, strategy, setup, and more. What would you like to know?</div>
            </div>
        </div>

        <form class="input-area" id="form">
            <input type="text" id="input" placeholder="Ask about Root..." autocomplete="off" autofocus>
            <button type="submit" id="send-btn">Send</button>
        </form>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
